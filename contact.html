<h1>Contact Me</h1>

<form id="contactForm">

    <input
        type="text"
        id="name"
        placeholder="Full Name">

    <input
        type="text"
        id="email"
        placeholder="Email Address">

    <input
        type="text"
        id="phone"
        placeholder="Phone Number">

    <textarea
        id="message"
        rows="6"
        placeholder="Your Message"></textarea>

    <button type="submit">
        Send Message
    </button>

</form>
